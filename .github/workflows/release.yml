name: Release

on:
  push:
    branches:
      - main
      - "6.x"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: ${{ github.ref_name == 'main' && 'Version Packages' || format('Version Packages ({0})', github.ref_name) }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}

  prerelease:
    name: Prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for pending changesets
        id: changesets
        shell: bash
        run: |
          shopt -s nullglob
          count=0
          for f in .changeset/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            count=$((count + 1))
          done
          echo "has_pending=$([ $count -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.changesets.outputs.has_pending == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # `changeset version --snapshot` still applies the release plan and deletes
      # `.changeset/*.md` when not in changesets pre mode -- read those files from a
      # copy afterward (see CHANGESET_NOTES_ROOT in Build release notes).
      - name: Preserve changesets for release notes
        if: steps.changesets.outputs.has_pending == 'true'
        shell: bash
        run: |
          rm -rf /tmp/sc-notes-root
          mkdir -p /tmp/sc-notes-root/.changeset
          shopt -s nullglob
          for f in .changeset/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            cp "$f" /tmp/sc-notes-root/.changeset/
          done

      - name: Snapshot version bump (in-place, not committed)
        if: steps.changesets.outputs.has_pending == 'true'
        run: |
          pnpm changeset version --snapshot prerelease
          echo "## Snapshot versions" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          for pkg_json in packages/*/package.json; do
            is_private=$(jq -r '.private // false' "$pkg_json")
            [ "$is_private" = "true" ] && continue
            echo "$(jq -r '.name' "$pkg_json")@$(jq -r '.version' "$pkg_json")" | tee -a "$GITHUB_STEP_SUMMARY"
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build release notes per package
        if: steps.changesets.outputs.has_pending == 'true'
        shell: bash
        env:
          # Reads `.changeset` under this directory; must be pre-snapshot copy because
          # `changeset version --snapshot` removes applied changeset files from the repo.
          CHANGESET_NOTES_ROOT: /tmp/sc-notes-root
        run: |
          mkdir -p /tmp/release-notes
          node scripts/prerelease-release-notes.cjs

      - name: Publish to npm 6.x-test tag
        if: steps.changesets.outputs.has_pending == 'true'
        run: pnpm release --tag 6.x-test --no-git-tag

      - name: Create git tag + GitHub prerelease per published package
        if: steps.changesets.outputs.has_pending == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for pkg_json in packages/*/package.json; do
            is_private=$(jq -r '.private // false' "$pkg_json")
            [ "$is_private" = "true" ] && continue
            name=$(jq -r '.name' "$pkg_json")
            version=$(jq -r '.version' "$pkg_json")
            ref="${name}@${version}"
            safe=$(printf '%s' "$name" | tr '@/' '_')
            notes_file="/tmp/release-notes/${safe}.md"
            git tag -a "$ref" -m "$ref"
            git push origin "refs/tags/$ref"
            if [ -s "$notes_file" ]; then
              gh release create "$ref" --prerelease --title "$ref" --notes-file "$notes_file"
            else
              gh release create "$ref" --prerelease --title "$ref" --notes "Internal changes only."
            fi
          done
