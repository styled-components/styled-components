name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request
        uses: changesets/action@v1
        with:
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_GITHUB_TOKEN }}

  prerelease:
    name: Prerelease
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          cache: "pnpm"
          node-version-file: ".nvmrc"
          registry-url: "https://registry.npmjs.org"

      - name: Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: Check for pending changesets
        id: changesets
        shell: bash
        run: |
          shopt -s nullglob
          count=0
          for f in .changeset/*.md; do
            [ "$(basename "$f")" = "README.md" ] && continue
            count=$((count + 1))
          done
          echo "has_pending=$([ $count -gt 0 ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

      - name: Configure git identity
        if: steps.changesets.outputs.has_pending == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Snapshot version bump (in-place, not committed)
        if: steps.changesets.outputs.has_pending == 'true'
        run: |
          pnpm changeset version --snapshot prerelease
          echo "## Snapshot versions" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          for pkg_json in packages/*/package.json; do
            is_private=$(jq -r '.private // false' "$pkg_json")
            [ "$is_private" = "true" ] && continue
            echo "$(jq -r '.name' "$pkg_json")@$(jq -r '.version' "$pkg_json")" | tee -a "$GITHUB_STEP_SUMMARY"
          done
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Build release notes per package
        if: steps.changesets.outputs.has_pending == 'true'
        shell: bash
        run: |
          mkdir -p /tmp/release-notes
          node - <<'NODE'
          (async () => {
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            const readChangesets = require('@changesets/read').default;
            const git = require('@changesets/git');
            const { getReleaseLine } = require('@changesets/cli/changelog').default;

            const cwd = process.cwd();
            const repo = process.env.GITHUB_REPOSITORY;

            const packagesDir = path.join(cwd, 'packages');
            const packages = [];
            for (const d of fs.readdirSync(packagesDir)) {
              const jsonPath = path.join(packagesDir, d, 'package.json');
              if (!fs.existsSync(jsonPath)) continue;
              const pkg = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
              if (pkg.private) continue;
              packages.push(pkg);
            }

            const changesets = await readChangesets(cwd);
            if (changesets.length) {
              const paths = changesets.map(c => `.changeset/${c.id}.md`);
              const shaMap = await git.getCommitsThatAddFiles(paths, { cwd, short: true });
              for (const cs of changesets) {
                cs.commit = shaMap.get(`.changeset/${cs.id}.md`) || undefined;
              }
            }

            const byPkg = new Map();
            for (const cs of changesets) {
              for (const release of cs.releases) {
                if (release.type === 'none') continue;
                let groups = byPkg.get(release.name);
                if (!groups) {
                  groups = { major: [], minor: [], patch: [] };
                  byPkg.set(release.name, groups);
                }
                groups[release.type].push({ changeset: cs, type: release.type });
              }
            }

            const labels = { major: 'Major Changes', minor: 'Minor Changes', patch: 'Patch Changes' };
            for (const pkg of packages) {
              const groups = byPkg.get(pkg.name);
              const parts = [];
              if (groups) {
                for (const t of ['major', 'minor', 'patch']) {
                  if (groups[t].length === 0) continue;
                  parts.push(`### ${labels[t]}`, '');
                  for (const { changeset, type } of groups[t]) {
                    parts.push(await getReleaseLine(changeset, type));
                  }
                  parts.push('');
                }
              }
              if (parts.length === 0) parts.push('Internal changes only.', '');

              let prevTag = '';
              try {
                prevTag = execSync(`git tag --list '${pkg.name}@*' --sort=-v:refname`, { encoding: 'utf8' })
                  .split('\n').filter(Boolean)[0] || '';
              } catch {}
              if (prevTag) {
                const currentTag = `${pkg.name}@${pkg.version}`;
                const compareUrl = `https://github.com/${repo}/compare/${encodeURIComponent(prevTag)}...${encodeURIComponent(currentTag)}`;
                parts.push(`**Full Changelog**: ${compareUrl}`);
              }

              const safe = pkg.name.replace(/[@/]/g, '_');
              fs.writeFileSync(`/tmp/release-notes/${safe}.md`, parts.join('\n'));
            }
          })().catch(err => { console.error(err); process.exit(1); });
          NODE

      - name: Publish to npm test tag
        if: steps.changesets.outputs.has_pending == 'true'
        run: pnpm release --tag test --no-git-tag

      - name: Create git tag + GitHub prerelease per published package
        if: steps.changesets.outputs.has_pending == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for pkg_json in packages/*/package.json; do
            is_private=$(jq -r '.private // false' "$pkg_json")
            [ "$is_private" = "true" ] && continue
            name=$(jq -r '.name' "$pkg_json")
            version=$(jq -r '.version' "$pkg_json")
            ref="${name}@${version}"
            safe=$(printf '%s' "$name" | tr '@/' '_')
            notes_file="/tmp/release-notes/${safe}.md"
            git tag -a "$ref" -m "$ref"
            git push origin "refs/tags/$ref"
            if [ -s "$notes_file" ]; then
              gh release create "$ref" --prerelease --title "$ref" --notes-file "$notes_file"
            else
              gh release create "$ref" --prerelease --title "$ref" --notes "Internal changes only."
            fi
          done
